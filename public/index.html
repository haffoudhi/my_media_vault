<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Private Video Library</title>
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./assets/font-awesome-7.2.0/css/all.min.css">
</head>
<body>

<div id="sidebar">
    <h2>Library</h2>
    <div id="explorer"></div>
</div>

<div id="player-container">
    <h3 id="now-playing">Select an Episode</h3>

    <div class="custom-player" id="video-wrapper">
        <video id="mainPlayer"></video>

        <div id="middle-play-overlay" class="middle-play-pause">
            <i class="fas fa-play"></i>
        </div>

        <div class="controls">
            <div class="progress-area">
                <div class="progress-bar"><span></span></div>
            </div>

            <div class="control-buttons">
                <div class="section-left">
                    <button id="playlist-toggle" title="Playlist"><i class="fas fa-list-check"></i></button>

                    <div class="time-display">
                        <span id="current-time">00:00</span>
                        <span style="margin: 0 4px; color: #555;">/</span>
                        <span id="total-duration">00:00</span>
                    </div>

                    <div class="volume-container">
                        <button id="mute-btn" title="Mute/Unmute (M)">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
                    </div>
                </div>

                <div class="section-center">
                    <button id="skip-back" title="Rewind"><i class="fas fa-backward"></i></button>
                    <button id="play-pause" title="Play/Pause"><i class="fas fa-play"></i></button>
                    <button id="skip-forward" title="Fast Forward"><i class="fas fa-forward"></i></button>
                </div>

                <div class="section-right">
                    <button id="markWatched" title="Toggle Watched">
                        <i id="watched-icon" class="far fa-square"></i>
                    </button>
                    <button id="fullscreen-btn" title="Fullscreen"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>

        <div id="playlist-overlay" class="hidden">
            <div class="playlist-header">
                <span>Folder Episodes</span>
                <i class="fas fa-times" id="close-playlist"></i>
            </div>
            <div id="playlist-items"></div>
        </div>
    </div>
</div>

<script src="./api.js"></script>
<script src="./player.js"></script>
<script src="./script.js"></script>
</body>
</html>
